<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>图像数字化演示：像素与量化</title>
  <style>
    body {
      font-family: "Microsoft YaHei", sans-serif;
      background: #2b2d42;
      color: #edf2f4;
      text-align: center;
      padding: 20px;
      margin: 0;
    }
    .container {
      max-width: 1000px;
      margin: 0 auto;
      background: #8d99ae;
      border-radius: 15px;
      padding: 30px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      color: #2b2d42;
    }
    h1 { margin-bottom: 10px; color: #2b2d42; }
    
    /* 布局 */
    .main-area {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 20px;
      flex-wrap: wrap;
    }
    
    /* 画布容器 */
    .canvas-box {
      position: relative;
      border: 4px solid #2b2d42;
      background: #fff;
      box-shadow: 5px 5px 15px rgba(0,0,0,0.3);
    }
    canvas { display: block; }

    /* 控制面板 */
    .controls {
      width: 300px;
      text-align: left;
      background: #edf2f4;
      padding: 20px;
      border-radius: 10px;
    }
    .control-group { margin-bottom: 25px; }
    label { display: block; font-weight: bold; margin-bottom: 8px; }
    input[type=range] { width: 100%; cursor: pointer; }
    
    /* 信息显示 */
    .info-panel {
      margin-top: 20px;
      padding: 15px;
      background: #2b2d42;
      color: #fff;
      border-radius: 8px;
      font-family: monospace;
      font-size: 0.9em;
    }
    .zoom-view {
      margin-top: 15px;
      border: 2px dashed #ef233c;
      width: 100px;
      height: 100px;
      display: inline-block;
      background: #fff;
      image-rendering: pixelated; /* 关键：让放大不模糊 */
    }
    
    .upload-btn {
      display: inline-block;
      padding: 8px 15px;
      background: #ef233c;
      color: white;
      border-radius: 5px;
      cursor: pointer;
      margin-bottom: 15px;
      font-size: 0.9em;
    }
    input[type="file"] { display: none; }
  </style>
</head>
<body>

<div class="container">
  <h1>📷 图像数字化原理演示</h1>
  <p>调整参数，观察模拟图像如何变为数字图像（像素阵列）</p>

  <div class="main-area">
    <!-- 左侧：主画布 -->
    <div class="canvas-box">
      <canvas id="mainCanvas" width="400" height="400"></canvas>
    </div>

    <!-- 右侧：控制与详情 -->
    <div class="controls">
      <label class="upload-btn">
        📂 点击上传图片
        <input type="file" id="uploadImg" accept="image/*">
      </label>

      <div class="control-group">
        <label>1. 空间分辨率 (像素网格): <span id="res-val" style="color:#ef233c">16x16</span></label>
        <input type="range" id="resolution" min="4" max="100" value="16">
        <small>值越小，马赛克越明显</small>
      </div>

      <div class="control-group">
        <label>2. 颜色位深 (色彩量化): <span id="color-val" style="color:#ef233c">4 bit</span></label>
        <input type="range" id="bitDepth" min="1" max="8" value="4" step="1">
        <small>值越小，颜色越少（色带现象）</small>
      </div>

      <!-- 局部放大与数据 -->
      <div class="info-panel">
        <div>当前鼠标位置像素数据：</div>
        <div id="pixel-data">请将鼠标移入图片</div>
        <div style="margin-top:10px; text-align:center;">
          <div>单像素放大视图:</div>
          <canvas id="zoomCanvas" class="zoom-view" width="100" height="100"></canvas>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  const mainCanvas = document.getElementById('mainCanvas');
  const ctx = mainCanvas.getContext('2d');
  const zoomCanvas = document.getElementById('zoomCanvas');
  const zoomCtx = zoomCanvas.getContext('2d');

  let originalImage = new Image();
  // 默认生成一个渐变图作为演示
  originalImage.src = 'data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0MDAiIGhlaWdodD0iNDAwIj48ZGVmcz48bGluZWFyR3JhZGllbnQgaWQ9ImciIHgxPSIwJSIgeTE9IjAlIiB4Mj0iMTAwJSIgeTI9IjEwMCUiPjxzdG9wIG9mZnNldD0iMCUiIHN0eWxlPSJzdG9wLWNvbG9yOiNmZjAwMDA7IiAvPjxzdG9wIG9mZnNldD0iNTAlIiBzdHlsZT0ic3RvcC1jb2xvcjojMDBmZjAwOyIgLz48c3RvcCBvZmZzZXQ9IjEwMCUiIHN0eWxlPSJzdG9wLWNvbG9yOiMwMDBmZjA7IiAvPjwvbGluZWFyR3JhZGllbnQ+PC9kZWZzPjxyZWN0IHdpZHRoPSI0MDAiIGhlaWdodD0iNDAwIiBmaWxsPSJ1cmwoI2cpIiAvPjxjaXJjbGUgY3g9IjIwMCIgY3k9IjIwMCIgcj0iMTAwIiBmaWxsPSJ5ZWxsb3ciIC8+PC9zdmc+';
  
  let imgLoaded = false;

  originalImage.onload = () => {
    imgLoaded = true;
    processImage();
  };

  // 监听上传
  document.getElementById('uploadImg').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if(file){
      const reader = new FileReader();
      reader.onload = function(event){
        originalImage.src = event.target.result;
      }
      reader.readAsDataURL(file);
    }
  });

  // 参数监听
  const resSlider = document.getElementById('resolution');
  const bitSlider = document.getElementById('bitDepth');
  
  resSlider.addEventListener('input', () => {
    document.getElementById('res-val').innerText = `${resSlider.value}x${resSlider.value}`;
    processImage();
  });
  
  bitSlider.addEventListener('input', () => {
    document.getElementById('color-val').innerText = `${bitSlider.value} bit`;
    processImage();
  });

  // 核心处理函数
  function processImage() {
    if (!imgLoaded) return;

    const w = mainCanvas.width;
    const h = mainCanvas.height;
    const gridSize = parseInt(resSlider.value); // 网格大小 (例如 16x16)
    const bits = parseInt(bitSlider.value);     // 颜色位深

    // 1. 计算每个大像素块的大小
    const blockSize = w / gridSize;

    // 清空画布
    ctx.clearRect(0, 0, w, h);

    // 2. 遍历网格进行采样和量化
    for (let y = 0; y < gridSize; y++) {
      for (let x = 0; x < gridSize; x++) {
        
        // --- 采样 ---
        // 获取该方块中心点的原始颜色
        const centerX = Math.floor(x * blockSize + blockSize / 2);
        const centerY = Math.floor(y * blockSize + blockSize / 2);
        
        // 创建一个临时小画布来获取原始像素数据
        const tempC = document.createElement('canvas');
        tempC.width = 1; tempC.height = 1;
        const tempCtx = tempC.getContext('2d');
        tempCtx.drawImage(originalImage, -centerX, -centerY);
        const pData = tempCtx.getImageData(0, 0, 1, 1).data;
        
        let r = pData[0], g = pData[1], b = pData[2];

        // --- 量化 ---
        // 根据位深减少颜色数量
        // 256种颜色 -> 2^bits 种颜色
        // 简单的均匀量化算法
        const levels = Math.pow(2, bits);
        const step = 256 / levels;
        
        r = Math.floor(r / step) * step + step/2;
        g = Math.floor(g / step) * step + step/2;
        b = Math.floor(b / step) * step + step/2;

        // 限制范围
        r = Math.min(255, Math.max(0, r));
        g = Math.min(255, Math.max(0, g));
        b = Math.min(255, Math.max(0, b));

        // --- 编码 (绘制) ---
        ctx.fillStyle = `rgb(${r},${g},${b})`;
        ctx.fillRect(x * blockSize, y * blockSize, blockSize, blockSize);
        
        // 绘制网格线 (如果格子够大)
        if (blockSize > 5) {
          ctx.strokeStyle = 'rgba(255,255,255,0.2)';
          ctx.lineWidth = 1;
          ctx.strokeRect(x * blockSize, y * blockSize, blockSize, blockSize);
        }
      }
    }
  }

  // 鼠标交互：显示具体像素信息
  mainCanvas.addEventListener('mousemove', (e) => {
    if(!imgLoaded) return;
    const rect = mainCanvas.getBoundingClientRect();
    const mouseX = e.clientX - rect.left;
    const mouseY = e.clientY - rect.top;

    // 获取当前鼠标下的颜色
    const p = ctx.getImageData(mouseX, mouseY, 1, 1).data;
    const r=p[0], g=p[1], b=p[2];
    
    // 转二进制 (取高几位展示)
    const bits = parseInt(bitSlider.value);
    // 简单展示 R 通道的二进制
    const binR = (r).toString(2).padStart(8, '0').substring(0, bits);

    document.getElementById('pixel-data').innerHTML = 
      `RGB: (${Math.round(r)}, ${Math.round(g)}, ${Math.round(b)})<br>` +
      `R通道二进制(前${bits}位): <span style="color:#ef233c">${binR}...</span>`;

    // 放大视图
    zoomCtx.clearRect(0,0,100,100);
    zoomCtx.fillStyle = `rgb(${r},${g},${b})`;
    zoomCtx.fillRect(0,0,100,100);
  });

</script>

</body>
</html>
